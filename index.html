    fengshui: '강남구 壬午(화) 지역. 봉은사와 같은 블록, 삼성동 금융·상업 에너지 집중',
    elementDetails: [
      { element: '화', desc: '강남 壬午(화) 지역. 남방 화기와 활발한 상업 에너지', fortune: '화기 → 명예·인기·표현력 상승' },
      { element: '금', desc: '삼성동 금융·상업 중심부. 코엑스·무역센터의 재물 에너지', fortune: '금기 → 재물 축적·결단력 강화' },
    ],
    fortune: '화극금(火剋金) 긴장 — 열정과 결단이 서로 벼리며 만드는 균형의 터' },

  // ═══════════ 호텔: 木 ═══════════
  { name: 'JW 메리어트 동대문', elements: ['목'], type: 'hotel',
    lat: 37.5710, lng: 127.0093, address: '서울특별시 종로구 청계천로 279',
    fengshui: '동대문 乙卯(목·목) 지역. 동쪽 흥인지문(仁=목) 기운. 전 체계 만장일치 목기',
    fortune: '목기 → 새출발·추진력·성장운' },

  // ═══════════ 호텔: 水 ═══════════
  { name: '콘래드 서울', elements: ['수'], type: 'hotel',
    lat: 37.5249, lng: 126.9265, address: '서울특별시 영등포구 국제금융로 10',
    fengshui: '여의도 수기 지역. 한강 직면, IFC 금융 중심부',
    fortune: '수기 → 인맥·소통·유동적 재물(투자) 활성화' },

  // ═══════════ 호텔: 복합 ═══════════
  { name: '롯데호텔 월드', elements: ['목', '토'], type: 'hotel',
    lat: 37.5112, lng: 127.0981, address: '서울특별시 송파구 올림픽로 240',
    fengshui: '송파구 乙未(목·토) 지역. 목기와 토기가 공존하는 복합 기운',
    elementDetails: [
      { element: '목', desc: '송파구 乙(목) 기운. 성장하려는 추진 에너지', fortune: '목기 → 새출발·추진력·성장' },
      { element: '토', desc: '송파구 未(토) 기운. 안정하려는 기반 에너지', fortune: '토기 → 안정·신뢰·기반 다지기' },
    ],
    fortune: '목극토(木剋土) 긴장 — 도전 속에서도 기반을 잃지 않는 균형의 터' },

  { name: '몬드리안 서울 이태원', elements: ['토'], type: 'hotel',
    lat: 37.5340, lng: 126.9870, address: '서울특별시 용산구 장문로 23',
    fengshui: '용산구 戊辰(토·토) 지역. 이태원 일대의 안정된 토기',
    fortune: '토기 → 안정·신뢰·부동산운' },

  { name: '그랜드 워커힐 서울', elements: ['목', '수'], type: 'hotel',
    lat: 37.5505, lng: 127.1050, address: '서울특별시 광진구 워커힐로 177',
    fengshui: '아차산(동=목) 배산 + 한강(수) 임수. 배산임수 전형',
    elementDetails: [
      { element: '목', desc: '아차산(동방=목) 배산. 동쪽 산의 성장·건강 기운을 등에 짐', fortune: '목기 → 건강·성장·추진력' },
      { element: '수', desc: '한강 임수. 대하(大河)의 수기를 정면에서 받는 자리', fortune: '수기 → 인맥·지혜·재물 흐름' },
    ],
    fortune: '수생목(水生木) 상생 — 지혜와 인맥이 성장의 밑거름이 되는 배산임수 명당' },
];

// ── 지도 초기화 ──
const map = L.map('map', {
  center: [37.545, 127.00],
  zoom: 12,
  zoomControl: false,
});

// 줌 컨트롤 삭제 (핀치 줌은 유지)

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 18,
}).addTo(map);

// ── 상태 ──
let activeElement = 'all';
let activeType = 'all';

// ── 팝업 HTML 생성 ──
function buildPopup(place) {
  const isDual = place.elements.length > 1;

  const badgesHtml = place.elements.map(el => {
    const c = ELEMENT_CONFIG[el];
    return `<span class="element-badge" style="background:${c.color}">${c.label}</span>`;
  }).join('');

  let bodyHtml = '';

  if (isDual && place.elementDetails) {
    place.elementDetails.forEach(d => {
      const c = ELEMENT_CONFIG[d.element];
      bodyHtml += `
        <div class="element-card" style="background:${c.bg}; border-color:${c.color}">
          <div class="el-header">
            <span class="el-emoji">${c.emoji}</span>
            <span style="color:${c.color}">${c.label}</span>
          </div>
          <div class="el-desc">${d.desc}</div>
          <div class="el-fortune" style="color:${c.color}">${d.fortune}</div>
        </div>`;
    });

    const rel = getRelation(place.elements[0], place.elements[1]);
    if (rel) {
      const relIcon = rel.type === 'sangsaeng' ? '✨' : '⚡';
      const relLabel = rel.type === 'sangsaeng' ? '상생' : '긴장';
      bodyHtml += `
        <div class="relation-card ${rel.type}">
          <div class="rel-header">${relIcon} ${relLabel} 관계</div>
          <div class="rel-name">${rel.name}</div>
          <div class="rel-desc">${rel.desc}</div>
        </div>`;
    }
  } else {
    bodyHtml = `
      <div class="feng-shui">${place.fengshui}</div>
      <div class="fortune">${place.fortune}</div>`;
  }

  return `
    <div class="popup-content">
      <div class="popup-badges">
        ${badgesHtml}
        <span class="type-badge">${TYPE_LABELS[place.type]}</span>
      </div>
      <h3>${place.name}</h3>
      <div class="address"><span class="address-text">${place.address}</span><button class="copy-btn" onclick="copyAddress(this, '${place.address}')">주소복사</button></div>
      ${isDual && place.elementDetails ? `<div class="feng-shui" style="margin-bottom:10px">${place.fengshui}</div>` : ''}
      ${bodyHtml}
    </div>`;
}

// ── 마커 생성 ──
const markers = [];

places.forEach((place, idx) => {
  const primary = ELEMENT_CONFIG[place.elements[0]];
  const isDual = place.elements.length > 1;
  const emoji = ELEMENT_EMOJI[place.elements[0]];
  const shapeClass = place.type;

  let markerHtml;

  if (isDual) {
    const sec = ELEMENT_CONFIG[place.elements[1]];
    markerHtml = `<div class="custom-marker dual ${shapeClass}" style="background: linear-gradient(135deg, ${primary.color} 50%, ${sec.color} 50%)"><span class="marker-emoji">${emoji}</span></div>`;
  } else {
    markerHtml = `<div class="custom-marker ${shapeClass}" style="background:${primary.color}"><span class="marker-emoji">${emoji}</span></div>`;
  }

  const size = isDual ? 40 : 36;
  const anchor = isDual ? 20 : 18;

  const icon = L.divIcon({
    className: '',
    html: markerHtml,
    iconSize: [size, size],
    iconAnchor: [anchor, anchor],
    popupAnchor: [0, -20],
  });

  const marker = L.marker([place.lat, place.lng], { icon })
    .bindPopup(buildPopup(place));

  // 모바일에서는 팝업 대신 바텀시트
  marker.on('click', function(e) {
    if (window.innerWidth <= 768) {
      e.target.closePopup();
      openDetailSheet(place);
    }
  });

  marker._elements = place.elements;
  marker._type = place.type;
  marker._placeIdx = idx;
  marker.addTo(map);
  markers.push(marker);
});

// ── 모바일 상세 바텀시트 ──
const detailOverlay = document.getElementById('detailOverlay');
const detailSheet = document.getElementById('detailSheet');
const detailHandle = document.getElementById('detailHandle');
const detailBody = document.getElementById('detailBody');

function openDetailSheet(place) {
  detailBody.innerHTML = buildPopup(place);
  requestAnimationFrame(() => {
    detailOverlay.classList.add('active');
    detailSheet.classList.add('active');
  });
}

function closeDetailSheet() {
  detailSheet.classList.remove('active');
  detailOverlay.classList.remove('active');
}

detailOverlay.addEventListener('click', closeDetailSheet);
detailHandle.addEventListener('click', closeDetailSheet);

// ── 보이는 마커에 맞춰 자동 줌 ──
function fitToVisible() {
  const visible = markers.filter(m => map.hasLayer(m));
  if (visible.length === 0) return;
  const group = L.featureGroup(visible);
  map.fitBounds(group.getBounds(), {
    paddingTopLeft: [40, 160],
    paddingBottomRight: [40, 100],
    maxZoom: 15,
    animate: true,
    duration: 0.5,
  });
}

// ── 필터 로직 ──
function applyFilters() {
  markers.forEach(m => {
    const elMatch = activeElement === 'all' || m._elements.includes(activeElement);
    const typeMatch = activeType === 'all' || m._type === activeType;

    if (elMatch && typeMatch) {
      m.addTo(map);
    } else {
      map.removeLayer(m);
    }
  });
  fitToVisible();
  buildPanelList();
}

// 활성 버튼을 부모 스크롤 영역 중앙으로
function scrollToCenter(btn) {
  const row = btn.parentElement;
  const left = btn.offsetLeft - row.offsetWidth / 2 + btn.offsetWidth / 2;
  row.scrollTo({ left, behavior: 'smooth' });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeElement = btn.dataset.element;
    applyFilters();
    scrollToCenter(btn);
  });
});

document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    applyFilters();
    scrollToCenter(btn);
  });
});

// 초기 로드 시 활성 버튼 중앙 정렬
document.querySelectorAll('.filter-row').forEach(row => {
  const active = row.querySelector('.active');
  if (active) {
    const left = active.offsetLeft - row.offsetWidth / 2 + active.offsetWidth / 2;
    row.scrollLeft = left;
  }
});

// ═══════════ 하단 패널 로직 ═══════════

const bottomPanel = document.getElementById('bottomPanel');
const panelHandle = document.getElementById('panelHandle');
const panelList = document.getElementById('panelList');
const panelCount = document.getElementById('panelCount');
const disclaimer = document.getElementById('disclaimer');

let panelOpen = false;

panelHandle.addEventListener('click', () => {
  panelOpen = !panelOpen;
  bottomPanel.classList.toggle('collapsed', !panelOpen);
  disclaimer.style.opacity = panelOpen ? '0' : '1';
});

function buildPanelList() {
  // 필터 적용된 장소만
  const filtered = places.filter(p => {
    const elMatch = activeElement === 'all' || p.elements.includes(activeElement);
    const typeMatch = activeType === 'all' || p.type === activeType;
    return elMatch && typeMatch;
  });

  panelCount.textContent = filtered.length;

  // 타입별 그룹핑
  const grouped = {};
  TYPE_ORDER.forEach(t => { grouped[t] = []; });
  filtered.forEach(p => {
    if (grouped[p.type]) grouped[p.type].push(p);
  });

  let html = '';

  TYPE_ORDER.forEach(type => {
    const group = grouped[type];
    if (group.length === 0) return;

    const shapeClass = 's-' + type;
    html += `<div class="panel-group-header"><div class="gh-shape ${shapeClass}"></div>${TYPE_LABELS[type]} (${group.length})</div>`;

    group.forEach(place => {
      const idx = places.indexOf(place);
      const primary = ELEMENT_CONFIG[place.elements[0]];
      const isDual = place.elements.length > 1;

      const badgesHtml = place.elements.map(el => {
        const c = ELEMENT_CONFIG[el];
        return `<span class="mini-badge" style="background:${c.color}">${c.emoji}</span>`;
      }).join('');

      // 단축 운세 (첫 줄만)
      const shortFortune = place.fortune.split('—')[0].split('.')[0].trim();

      // 관계 태그
      let relTag = '';
      if (isDual) {
        const rel = getRelation(place.elements[0], place.elements[1]);
        if (rel) {
          const label = rel.type === 'sangsaeng' ? '✨ 상생' : '⚡ 긴장';
          relTag = `<span class="panel-item-rel ${rel.type}">${label}</span>`;
        }
      }

      const iconBg = isDual
        ? `linear-gradient(135deg, ${primary.color} 50%, ${ELEMENT_CONFIG[place.elements[1]].color} 50%)`
        : primary.color;

      html += `
        <div class="panel-item" data-idx="${idx}">
          <div class="panel-item-icon" style="background:${iconBg}">${ELEMENT_EMOJI[place.elements[0]]}</div>
          <div class="panel-item-body">
            <div class="panel-item-top">
              <span class="panel-item-name">${place.name}</span>
              <div class="panel-item-badges">${badgesHtml}</div>
              ${relTag}
            </div>
            <div class="panel-item-fortune">${shortFortune}</div>
          </div>
          <div class="panel-item-arrow">›</div>
        </div>`;
    });
  });

  panelList.innerHTML = html;

  // 클릭 이벤트
  panelList.querySelectorAll('.panel-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx);
      const place = places[idx];
      const marker = markers[idx];

      map.flyTo([place.lat, place.lng], 15, { duration: 0.8 });

      // 패널 접기
      panelOpen = false;
      bottomPanel.classList.add('collapsed');
      disclaimer.style.opacity = '1';

      // 모바일이면 바텀시트, 데스크톱이면 팝업
      if (window.innerWidth <= 768) {
        setTimeout(() => { openDetailSheet(place); }, 500);
      } else {
        setTimeout(() => { marker.openPopup(); }, 400);
      }
    });
  });
}

// ── 주소 복사 ──
function copyAddress(btn, address) {
  navigator.clipboard.writeText(address).then(() => {
    btn.textContent = '복사됨!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '주소복사';
      btn.classList.remove('copied');
    }, 1500);
  });
}

// 초기 렌더
buildPanelList();
fitToVisible();

</script>
</body>
</html>
